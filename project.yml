name: GitHubTahoeApp
options:
  bundleIdPrefix: com.Suryanshsaraf
  deploymentTarget:
    macOS: "14.0"

targets:
  GitHubTahoeApp:
    type: application
    platform: macOS
    sources:
      - path: GitHubTahoeApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.Suryanshsaraf.GitHubTahoeApp
      DEVELOPMENT_ASSET_PATHS: '"GitHubTahoeApp/Preview Content"'
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  GitHubTahoeWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: GitHubTahoeWidget
    dependencies:
      - target: GitHubTahoeApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.Suryanshsaraf.GitHubTahoeApp.WidgetExtension
    info:
      path: GitHubTahoeWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).TahoeWidget"
